<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin quản lý tủ</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    details summary {
    font-size: 22px;      /* chữ Tủ 1 - 0 giao dịch to hơn */
    font-weight: 700;
    padding: 18px 24px;
    cursor: pointer;
}

details summary::marker {
    font-size: 1.8em;     /* phóng to dấu tam giác */
}
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      color: #0f172a;
      background:
        radial-gradient(circle at top left, rgba(20, 184, 166, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.16), transparent 34%),
        linear-gradient(135deg, #ecfeff, #f8fafc 50%, #e0f2fe);
    }

    .hidden {
      display: none !important;
    }

    /* LOGIN */
    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      padding: 34px 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(18px);
    }

    .login-logo {
      width: 76px;
      height: 76px;
      margin: 0 auto 18px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: white;
      background: linear-gradient(135deg, #14b8a6, #2563eb);
      box-shadow: 0 14px 32px rgba(37, 99, 235, 0.24);
    }

    .login-card h1 {
      text-align: center;
      font-size: 30px;
      font-weight: 850;
      margin-bottom: 8px;
    }

    .login-card p {
      text-align: center;
      color: #64748b;
      margin-bottom: 26px;
      font-weight: 600;
    }

    .input-box {
      position: relative;
      margin-bottom: 15px;
    }

    .input-box i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 19px;
    }

    .input-box input {
      width: 100%;
      padding: 15px 15px 15px 44px;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      font-size: 15px;
      outline: none;
      color: #0f172a;
      background: rgba(255,255,255,0.92);
      transition: 0.22s;
    }

    .input-box input:focus {
      border-color: #14b8a6;
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.15);
    }

    .login-card button {
      width: 100%;
      border: none;
      margin-top: 8px;
      padding: 15px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #14b8a6, #2563eb);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.22);
      transition: 0.22s;
    }

    .login-card button:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .login-message {
      min-height: 22px;
      margin-top: 16px;
      text-align: center;
      color: #ef4444;
      font-weight: 700;
    }

    /* ADMIN */
    .layout {
      width: 100%;
      min-height: 100vh;
      padding: 28px;
    }

    .dashboard {
      max-width: 1250px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-icon {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: white;
      background: linear-gradient(135deg, #14b8a6, #2563eb);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.22);
    }

    .brand h1 {
      font-size: 34px;
      line-height: 1.1;
      font-weight: 900;
      color: #0f172a;
    }

    .brand p {
      margin-top: 6px;
      font-weight: 650;
      color: #000;
    }

    .logout-btn,
    .detail-btn {
      border: none;
      border-radius: 18px;
      padding: 16px 26px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #0f172a;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 12px 28px rgba(15,23,42,0.12);
      transition: 0.22s;
    }

    .detail-btn {
      color: white;
      background: linear-gradient(135deg, #14b8a6, #2563eb);
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn:hover,
    .detail-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .message {
      margin-bottom: 22px;
      padding: 16px 18px;
      border-radius: 18px;
      color: #000;
      font-weight: 800;
      background: rgba(224, 242, 254, 0.8);
      border: 1px solid rgba(125, 211, 252, 0.8);
    }

    .revenue-section {
      margin-bottom: 24px;
    }

    .revenue-summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 16px 42px rgba(15,23,42,0.1);
      backdrop-filter: blur(16px);
    }

    .stat-card span {
      display: block;
      color: #64748b;
      font-weight: 750;
      margin-bottom: 8px;
    }

    .stat-card strong {
      font-size: 30px;
      color: #0f172a;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 18px 0 12px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 900;
      color: #0f172a;
    }

    .table-box {
      overflow-x: auto;
      background: rgba(255,255,255,0.82);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(15,23,42,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 13px 14px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
      font-size: 14px;
    }

    th {
      background: #e0f2fe;
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 20px;
    }

    .locker-card {
      position: relative;
      overflow: hidden;
      padding: 22px 16px 18px;
      border-radius: 26px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.95);
      box-shadow: 0 18px 46px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(16px);
      transition: 0.25s;
    }

    .locker-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 5px;
      background: linear-gradient(90deg, #14b8a6, #38bdf8, #2563eb);
    }

    .locker-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 26px 58px rgba(15, 23, 42, 0.17);
    }

    .locker-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 22px;
      min-height: 116px;
    }

    .locker-left {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-shrink: 0;
    }

    .locker-icon {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f766e;
      font-size: 31px;
      background: #ccfbf1;
      border: 1px solid #99f6e4;
    }

    .locker-name {
      font-size: 34px;
      font-weight: 900;
      color: #000;
      margin: 0;
      line-height: 1;
      white-space: nowrap;
    }

    .locker-revenue-info {
      text-align: right;
      font-weight: 900;
      line-height: 1.7;
      color: #0f172a;
      padding-top: 6px;
      white-space: nowrap;
      font-size: 13px;
    }

    .locker-revenue-info .revenue {
      font-size: 16px;
    }

    .locker-revenue-info .count {
      font-size: 15px;
    }

    .action-btn {
      width: 100%;
      border: none;
      border-radius: 15px;
      padding: 14px 12px;
      margin-top: 10px;
      cursor: pointer;
      color: white;
      font-weight: 850;
      font-size: 15px;
      transition: 0.22s;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .btn-open {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 12px 24px rgba(16, 185, 129, 0.22);
    }

    .btn-reset {
      background: linear-gradient(135deg, #f43f5e, #dc2626);
      box-shadow: 0 12px 24px rgba(244, 63, 94, 0.2);
    }

    .btn-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* DETAIL PAGE INSIDE ADMIN */
    .detail-list {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .detail-box {
      overflow: hidden;
      border-radius: 20px;
      background: rgba(255,255,255,0.86);
      box-shadow: 0 12px 30px rgba(15,23,42,0.1);
      border: 1px solid rgba(255,255,255,0.9);
    }

    .detail-box summary {
      padding: 17px 20px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      background: #e0f2fe;
      color: #0f172a;
    }

    .detail-table-wrap {
      overflow-x: auto;
    }

    .detail-empty {
      padding: 16px 20px;
      font-weight: 800;
      color: #64748b;
      border-top: 1px solid #e2e8f0;
    }

    @media (max-width: 1020px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .revenue-summary {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .layout {
        padding: 18px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .brand h1 {
        font-size: 28px;
      }

      .logout-btn {
        width: 100%;
      }

      .section-header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <!-- LOGIN -->
  <div id="loginView" class="login-shell">
    <div class="login-card">
      <div class="login-logo">
        <i class="ri-shield-keyhole-line"></i>
      </div>

      <h1>Đăng nhập Admin</h1>
      <p>Hệ thống quản lý tủ giữ đồ thông minh</p>

      <div class="input-box">
        <i class="ri-user-line"></i>
        <input id="username" type="text" placeholder="Tên đăng nhập" />
      </div>

      <div class="input-box">
        <i class="ri-lock-password-line"></i>
        <input id="password" type="password" placeholder="Mật khẩu" />
      </div>

      <button onclick="loginAdmin()">
        <i class="ri-login-box-line"></i>
        Đăng nhập
      </button>

      <div id="loginMessage" class="login-message"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="adminView" class="hidden">
    <div class="layout">
      <div class="dashboard">
        <div class="topbar">
          <div class="brand">
            <div class="brand-icon">
              <i class="ri-dashboard-3-line"></i>
            </div>
            <div>
              <h1>Quản lý 8 tủ</h1>
              <p>Bảng điều khiển dành cho quản trị viên</p>
            </div>
          </div>

          <button class="logout-btn" onclick="logoutAdmin()">
            <i class="ri-logout-box-r-line"></i>
            Đăng xuất
          </button>
        </div>

        <div id="message" class="message">Sẵn sàng thao tác</div>

        <div id="adminPage">
          <div class="revenue-section">
            <div class="revenue-summary">
              <div class="stat-card">
                <span>Doanh thu hôm nay</span>
                <strong id="todayRevenue">0đ</strong>
              </div>

              <div class="stat-card">
                <span>Số lần trả phí hôm nay</span>
                <strong id="todayCount">0</strong>
              </div>
            </div>

            <div class="section-header">
              <h2 class="section-title">Thông tin chuyển khoản hôm nay</h2>

              <button class="detail-btn" onclick="showDetailPage()">
                <i class="ri-list-check-2"></i>
                Chi tiết
              </button>
            </div>

            
          </div>

          <div id="lockerGrid" class="grid"></div>
        </div>

        <div id="detailPage" class="hidden">
          <div class="section-header">
            <h2 class="section-title">Chi tiết giao dịch từng tủ hôm nay</h2>

            <button class="detail-btn" onclick="showAdminPage()">
              <i class="ri-arrow-left-line"></i>
              Quay lại
            </button>
          </div>

          <div id="lockerTransactionDetail" class="detail-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let latestRevenueData = null;

    function formatMoney(value) {
      return Number(value || 0).toLocaleString("vi-VN") + "đ";
    }

    async function loadRevenueToday() {
      try {
        const res = await fetch("/admin-revenue-today");
        const data = await res.json();

        if (!data.ok) return;

        latestRevenueData = data;

        document.getElementById("todayRevenue").innerText = formatMoney(data.totalRevenue);
        document.getElementById("todayCount").innerText = data.totalCount;

        for (let i = 1; i <= 8; i++) {
          const item = data.lockers[i] || { revenue: 0, count: 0 };
          const box = document.getElementById("lockerRevenue" + i);

          if (box) {
            box.innerHTML = `
              <div class="revenue">Doanh thu: ${formatMoney(item.revenue)}</div>
              <div class="count">Số lần giao dịch: ${item.count} lần</div>
            `;
          }
        }

        const rows = data.transactions.map(tx => `
          <tr>
            <td>${tx.dateTime}</td>
            <td>Tủ ${tx.lockerId}</td>
            <td>${formatMoney(tx.amount)}</td>
            <td>${tx.stkDoiUng}</td>
            <td>${tx.desc}</td>
          </tr>
        `).join("");

        document.getElementById("transactionBody").innerHTML =
          rows || `<tr><td colspan="5">Hôm nay chưa có giao dịch</td></tr>`;

        if (!document.getElementById("detailPage").classList.contains("hidden")) {
          renderTransactionDetail();
        }

      } catch (err) {
        console.log("Lỗi loadRevenueToday:", err);
      }
    }

    function showDetailPage() {
      document.getElementById("adminPage").classList.add("hidden");
      document.getElementById("detailPage").classList.remove("hidden");
      renderTransactionDetail();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showAdminPage() {
      document.getElementById("detailPage").classList.add("hidden");
      document.getElementById("adminPage").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderTransactionDetail() {
      if (!latestRevenueData) return;

      let html = "";

      for (let i = 1; i <= 8; i++) {
        const list = latestRevenueData.transactions.filter(tx => String(tx.lockerId) === String(i));

        let body = "";

        if (list.length === 0) {
          body = `<div class="detail-empty">Hôm nay chưa có giao dịch</div>`;
        } else {
          body = `
            <div class="detail-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Mã GD</th>
                    <th>Thời gian</th>
                    <th>Giá trị</th>
                    <th>STK khách hàng</th>
                    <th>Nội dung</th>
                  </tr>
                </thead>
                <tbody>
                  ${list.map(tx => `
                    <tr>
                      <td>${tx.maGD || ""}</td>
                      <td>${tx.dateTime}</td>
                      <td>${formatMoney(tx.amount)}</td>
                      <td>${tx.stkDoiUng}</td>
                      <td>${tx.desc}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          `;
        }

        html += `
          <details class="detail-box">
            <summary>Tủ ${i} - ${list.length} giao dịch</summary>
            ${body}
          </details>
        `;
      }

      document.getElementById("lockerTransactionDetail").innerHTML = html;
    }

    function setMessage(text) {
      document.getElementById("message").innerText = text;
    }

    function setLoginMessage(text) {
      document.getElementById("loginMessage").innerText = text;
    }

    function showAdminView() {
      document.getElementById("loginView").classList.add("hidden");
      document.getElementById("adminView").classList.remove("hidden");
    }

    function showLoginView() {
      document.getElementById("adminView").classList.add("hidden");
      document.getElementById("loginView").classList.remove("hidden");
    }

    async function loginAdmin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        setLoginMessage("Vui lòng nhập đầy đủ tài khoản và mật khẩu");
        return;
      }

      try {
        const res = await fetch("/admin-login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          setLoginMessage(data.message || "Đăng nhập thất bại");
          return;
        }

        sessionStorage.setItem("admin_logged_in", "true");
        showAdminView();
        initAdmin();

      } catch (err) {
        console.log(err);
        setLoginMessage("Lỗi kết nối server");
      }
    }

    function logoutAdmin() {
      sessionStorage.removeItem("admin_logged_in");
      showAdminPage();
      showLoginView();
      setLoginMessage("");
      document.getElementById("password").value = "";
    }

    function renderLockers(items) {
      const html = items.map(item => `
        <div class="locker-card">
          <div class="locker-top">
            <div class="locker-left">
              <div class="locker-icon">
                <i class="ri-door-lock-line"></i>
              </div>

              <div class="locker-name">Tủ ${item.id}</div>
            </div>

            <div class="locker-revenue-info" id="lockerRevenue${item.id}">
              <div class="revenue">Doanh thu: 0đ</div>
              <div class="count">Số lần giao dịch: 0 lần</div>
            </div>
          </div>

          <button class="action-btn btn-open" onclick="openLocker(${item.id})">
            <span class="btn-label">
              <i class="ri-lock-unlock-line"></i>
              <span>Mở tủ</span>
            </span>
          </button>

          <button class="action-btn btn-reset" onclick="resetLocker(${item.id})">
            <span class="btn-label">
              <i class="ri-refresh-line"></i>
              <span>Xóa trạng thái</span>
            </span>
          </button>
        </div>
      `).join("");

      document.getElementById("lockerGrid").innerHTML = html;
    }

    async function initAdmin() {
      try {
        const res = await fetch("/admin-status");
        const data = await res.json();

        if (data.ok) {
          renderLockers(data.items || []);
          setMessage("Đã tải danh sách tủ thành công");
        } else {
          setMessage("Không lấy được dữ liệu tủ");
        }

      } catch (err) {
        console.log(err);
        setMessage("Không tải được danh sách tủ");
      }

      loadRevenueToday();
    }

    async function openLocker(id) {
      try {
        await fetch("/admin-open/" + id, { method: "POST" });
        setMessage("Đã gửi lệnh mở tủ " + id);
      } catch (err) {
        setMessage("Lỗi mở tủ " + id);
      }
    }

    async function resetLocker(id) {
      try {
        await fetch("/admin-reset/" + id, { method: "POST" });
        setMessage("Đã xóa trạng thái tủ " + id);
      } catch (err) {
        setMessage("Lỗi reset tủ");
      }
    }

    window.onload = function () {
      const isLoggedIn = sessionStorage.getItem("admin_logged_in");

      setInterval(loadRevenueToday, 5000);

      if (isLoggedIn === "true") {
        showAdminView();
        initAdmin();
      } else {
        showLoginView();
      }
    };
  </script>
</body>
</html>

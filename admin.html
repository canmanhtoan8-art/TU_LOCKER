<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin quản lý 8 tủ</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      color: #e2e8f0;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(168, 85, 247, 0.10), transparent 24%),
        linear-gradient(135deg, #0f172a, #162338 45%, #1e293b 100%);
    }

    .hidden {
      display: none !important;
    }

    .wrap {
      max-width: 1220px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    /* LOGIN */
    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
    }

    .login-icon {
      width: 68px;
      height: 68px;
      margin: 0 auto 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(59,130,246,0.22), rgba(34,197,94,0.18));
      color: #e2e8f0;
      font-size: 30px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .login-card h1 {
      margin: 0 0 22px;
      text-align: center;
      font-size: 30px;
      color: #f8fafc;
      font-weight: 800;
    }

    .login-card input {
      width: 100%;
      padding: 14px 14px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      background: rgba(248, 250, 252, 0.95);
      color: #0f172a;
    }

    .login-card input:focus {
      border-color: rgba(59,130,246,0.8);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.16);
    }

    .login-card button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      transition: 0.22s;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.28);
    }

    .login-card button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .login-message {
      margin-top: 14px;
      min-height: 20px;
      text-align: center;
      color: #cbd5e1;
      font-weight: 600;
    }

    /* ADMIN */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .header-title {
      margin: 0;
      font-size: 36px;
      font-weight: 800;
      color: #f8fafc;
      letter-spacing: 0.2px;
    }

    .header-sub {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 15px;
      font-weight: 500;
    }

    .logout-btn {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #64748b, #475569);
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
      transition: 0.22s;
    }

    .logout-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .message {
      margin-bottom: 22px;
      padding: 15px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      font-weight: 600;
      color: #dbeafe;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(220px, 1fr));
      gap: 20px;
    }

    .locker-card {
      background: linear-gradient(145deg, rgba(30,41,59,0.96), rgba(15,23,42,0.96));
      border-radius: 22px;
      padding: 22px 18px 18px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0,0,0,0.38);
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .locker-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 16px;
      right: 16px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, #60a5fa, #22c55e, #a78bfa);
      opacity: 0.85;
    }

    .locker-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 50px rgba(0,0,0,0.48);
    }

    .locker-icon {
      width: 64px;
      height: 64px;
      margin: 4px auto 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(59,130,246,0.18), rgba(168,85,247,0.16));
      border: 1px solid rgba(255,255,255,0.06);
      color: #cbd5e1;
      font-size: 30px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .locker-name {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 18px;
      color: #f8fafc;
    }

    button.action-btn {
      border: none;
      border-radius: 12px;
      padding: 13px 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-bottom: 11px;
      color: white;
      transition: 0.22s ease;
      font-size: 14px;
    }

    button.action-btn:hover {
      transform: scale(1.02);
    }

    .btn-open {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 10px 22px rgba(34,197,94,0.18);
    }

    .btn-reset {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 10px 22px rgba(239,68,68,0.16);
    }

    .btn-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .header-title {
        font-size: 30px;
      }

      .topbar {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <!-- LOGIN -->
  <div id="loginView" class="login-shell">
    <div class="login-card">
      <div class="login-icon">
        <i class="ri-shield-keyhole-line"></i>
      </div>
      <h1>Đăng nhập Admin</h1>
      <input id="username" type="text" placeholder="Tên đăng nhập" />
      <input id="password" type="password" placeholder="Mật khẩu" />
      <button onclick="loginAdmin()">Đăng nhập</button>
      <div id="loginMessage" class="login-message"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="adminView" class="hidden">
    <div class="wrap">
      <div class="topbar">
        <div>
          <h1 class="header-title">Quản lý 8 tủ</h1>
        </div>
        <button class="logout-btn" onclick="logoutAdmin()">Đăng xuất</button>
      </div>

      <div id="message" class="message">Sẵn sàng</div>
      <div id="lockerGrid" class="grid"></div>
    </div>
  </div>

  <script>
    function setMessage(text) {
      document.getElementById("message").innerText = text;
    }

    function setLoginMessage(text) {
      document.getElementById("loginMessage").innerText = text;
    }

    function showAdminView() {
      document.getElementById("loginView").classList.add("hidden");
      document.getElementById("adminView").classList.remove("hidden");
    }

    function showLoginView() {
      document.getElementById("adminView").classList.add("hidden");
      document.getElementById("loginView").classList.remove("hidden");
    }

    async function loginAdmin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        setLoginMessage("Nhập đầy đủ tài khoản và mật khẩu");
        return;
      }

      try {
        const res = await fetch("/admin-login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          setLoginMessage(data.message || "Đăng nhập thất bại");
          return;
        }

        sessionStorage.setItem("admin_logged_in", "true");
        showAdminView();
        initAdmin();
      } catch (err) {
        console.log(err);
        setLoginMessage("Lỗi kết nối server");
      }
    }

    function logoutAdmin() {
      sessionStorage.removeItem("admin_logged_in");
      showLoginView();
      setLoginMessage("");
      document.getElementById("password").value = "";
    }

    function renderLockers(items) {
      const html = items.map(item => `
        <div class="locker-card">
          <div class="locker-icon">
            <i class="ri-lock-2-line"></i>
          </div>

          <div class="locker-name">Tủ ${item.id}</div>

          <button class="action-btn btn-open" onclick="openLocker(${item.id})">
            <span class="btn-label">
              <i class="ri-lock-unlock-line"></i>
              <span>Mở tủ</span>
            </span>
          </button>

          <button class="action-btn btn-reset" onclick="resetLocker(${item.id})">
            <span class="btn-label">
              <i class="ri-refresh-line"></i>
              <span>Xóa trạng thái</span>
            </span>
          </button>
        </div>
      `).join("");

      document.getElementById("lockerGrid").innerHTML = html;
    }

    async function initAdmin() {
      try {
        const res = await fetch("/admin-status");
        const data = await res.json();

        if (data.ok) {
          renderLockers(data.items || []);
        }
      } catch (err) {
        console.log(err);
        setMessage("Không tải được danh sách tủ");
      }
    }

    async function openLocker(id) {
      try {
        await fetch("/admin-open/" + id, { method: "POST" });
        setMessage("Đã mở tủ " + id);
      } catch (err) {
        setMessage("Lỗi mở tủ");
      }
    }

    async function resetLocker(id) {
      try {
        await fetch("/admin-reset/" + id, { method: "POST" });
        setMessage("Đã reset tủ " + id);
      } catch (err) {
        setMessage("Lỗi reset");
      }
    }

    window.onload = function () {
      const isLoggedIn = sessionStorage.getItem("admin_logged_in");

      if (isLoggedIn === "true") {
        showAdminView();
        initAdmin();
      } else {
        showLoginView();
      }
    };
  </script>
</body>
</html>
